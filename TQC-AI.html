<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-LOGI| AI INTERNAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff', 100: '#e0f2fe', 400: '#38bdf8', 500: '#0ea5e9',
                            600: '#0284c7', 800: '#075985', 900: '#0c4a6e',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #164e63; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #22d3ee; }
        
        .custom-scrollbar-light::-webkit-scrollbar-thumb { background: #cbd5e1; }
        body { background-color: #0f172a;}
    </style>
</head>
<body class="font-sans text-slate-800 antialiased flex h-screen overflow-hidden">

    <div id="mobile-sidebar-backdrop" onclick="toggleMobileMenu()" class="fixed inset-0 bg-slate-900/60 z-40 hidden md:hidden backdrop-blur-sm transition-opacity"></div>

    <aside id="mobile-sidebar" class="fixed md:relative top-0 left-0 z-50 w-80 bg-white flex flex-col h-full shadow-2xl md:shadow-[4px_0_24px_rgba(0,0,0,0.02)] transition-transform duration-300 -translate-x-full md:translate-x-0 border-r border-slate-100 shrink-0">
        
        <div class="h-24 flex items-center justify-between px-6">
            <div class="flex items-center gap-3 text-brand-600 font-bold text-xl tracking-tight">
                <img src="logo.png" alt="Logo" class="h-20 w-20 object-contain rounded-xl shrink-0">
                <span class="whitespace-nowrap">THONG QUAN <br> LOGISTICS</span>
            </div>
            <button onclick="toggleMobileMenu()" class="md:hidden text-slate-400 hover:text-red-500 p-2 -mr-2 transition-colors shrink-0">
                <i class="ph-bold ph-x text-xl"></i>
            </button>
        </div>

        <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-1.5 custom-scrollbar-light">
            <a href="index.html" class="w-full flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-brand-600 rounded-2xl font-medium transition-all group">
                <i class="ph-bold ph-house"></i> <span class= "font-bold">Trang chủ</span>
            </a>
        
            

            <p class="px-4 text-[11px] font-black text-cyan-600 uppercase tracking-widest mb-3 mt-6 flex items-center gap-2 border-t border-slate-100 pt-4">
                <i class="ph-fill ph-cpu animate-pulse text-sm"></i> Không gian AI
            </p>
            
            <a href="TQC_AI.html" class="relative block w-full group overflow-hidden rounded-2xl transition-all duration-300 shadow-[0_0_15px_rgba(34,211,238,0.3)]">
                <div class="absolute inset-0 bg-gradient-to-r from-cyan-500 via-blue-600 to-purple-600 opacity-30 animate-pulse"></div>
                <div class="relative flex items-center justify-between px-4 py-3 bg-slate-900 border border-cyan-500/50 rounded-2xl m-[1px]">
                    <div class="flex items-center gap-3">
                        <div class="relative flex items-center justify-center w-8 h-8 bg-slate-800 rounded-lg border border-cyan-400/30">
                            <img src="ai.png" alt="AI" class="w-6 h-6 object-contain drop-shadow-[0_0_8px_rgba(34,211,238,0.8)]">
                        </div>
                        <div>
                            <span class="block bg-gradient-to-r from-cyan-300 to-blue-400 bg-clip-text text-transparent font-black tracking-wide text-sm uppercase">T-Logi AI</span>
                            <span class="block text-[10px] text-cyan-500/70 font-mono tracking-widest">Tính năng đang phát triển</span>
                        </div>
                    </div>
                    <span class="relative flex h-2.5 w-2.5">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-cyan-500 shadow-[0_0_8px_rgba(34,211,238,1)]"></span>
                    </span>
                </div>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden bg-slate-900 z-0">
        
        <div class="absolute inset-0 bg-[radial-gradient(#22d3ee_1px,transparent_1px)] [background-size:24px_24px] opacity-[0.03] pointer-events-none"></div>
        <div class="absolute top-0 right-0 w-96 h-96 bg-cyan-500/10 rounded-full blur-[100px] pointer-events-none"></div>

        <header class="h-16 md:h-20 bg-slate-900/80 backdrop-blur-xl border-b border-cyan-500/20 flex items-center justify-between px-4 md:px-10 sticky top-0 z-20 shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleMobileMenu()" class="md:hidden text-cyan-500 hover:text-cyan-300 p-2 -ml-2 transition-colors">
                    <i class="ph-bold ph-list text-2xl"></i>
                </button>
                
                <div class="flex items-center gap-3">
                    <div class="relative"></div>
                        <img src="logo.png" alt="AI" class="w-20 h-20 md:w-20 md:h-20 object-contain drop-shadow-[0_0_8px_rgba(34,211,238,0.8)]">
                    </div>
                    <div>
                        <h2 class="text-white font-black text-lg md:text-xl tracking-wide flex items-center gap-2">T-Logi <span class="text-cyan-400">AI</span></h2>
                        <div class="flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 shadow-[0_0_5px_#34d399]"></span>
                            <p class="text-slate-400 text-[10px] md:text-xs font-mono uppercase tracking-widest">Đang hoạt động</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <button class="hidden md:flex items-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 rounded-xl text-xs font-bold transition-all">
                <i class="ph-bold ph-broom"></i> Xóa đoạn chat
            </button>
        </header>

        <div id="ai-chat-body" class="flex-1 overflow-y-auto p-3 md:p-8 relative z-10 w-full max-w-5xl mx-auto space-y-5 md:space-y-6">
            
            <div class="flex items-start gap-2 md:gap-6 w-full pr-4 md:pr-24">
                <img src="ai.png" alt="AI" class="w-8 h-8 md:w-10 md:h-10 object-contain drop-shadow-[0_0_10px_rgba(34,211,238,0.6)] shrink-0 mt-1">
            <div class="bg-slate-800/80 border border-cyan-500/20 px-4 py-3 rounded-2xl rounded-tl-none flex items-center gap-2">
                    <span class="text-xs text-cyan-400/70 font-mono">Xin chào! Tôi là T-Logi AI. Hãy nhập câu hỏi của bạn.</span>
                </div>
            </div>    
              

            <div class="h-4 md:h-10"></div>
        </div>

            <div class="flex items-center gap-4 md:gap-6 w-full pr-10 md:pr-24 hidden" id="ai-typing-indicator">
                <img src="ai.png" alt="AI" class="w-8 h-8 md:w-10 md:h-10 object-contain opacity-50 shrink-0 animate-pulse">
                <div class="bg-slate-800/50 border border-slate-700 px-5 py-4 rounded-2xl rounded-tl-none flex items-center gap-3">
                    <span class="text-xs text-cyan-500/70 font-mono tracking-wider">Đang soạn tin</span>
                    <span class="flex gap-1.5">
                        <span class="w-1.5 h-1.5 bg-cyan-500 rounded-full animate-bounce"></span>
                        <span class="w-1.5 h-1.5 bg-cyan-500 rounded-full animate-bounce" style="animation-delay: 0.15s"></span>
                        <span class="w-1.5 h-1.5 bg-cyan-500 rounded-full animate-bounce" style="animation-delay: 0.3s"></span>
                    </span>
                </div>
            </div>
            
            <div class="h-10"></div>
        </div>

        <div class="p-4 md:p-6 bg-slate-900/90 backdrop-blur-xl border-t border-cyan-500/20 relative z-20 shrink-0">
            <div class="max-w-4xl mx-auto">
                <div class="relative flex items-end bg-slate-800/80 border border-slate-600 focus-within:border-cyan-500 focus-within:ring-1 focus-within:ring-cyan-500 rounded-2xl transition-all shadow-[0_10px_30px_rgba(0,0,0,0.5)] overflow-hidden">
                    
                   
                    
                    <textarea id="ai-prompt-input" rows="1" class="flex-1 bg-transparent text-slate-100 px-4 py-3.5 md:py-4 focus:outline-none resize-none min-h-[52px] max-h-32 custom-scrollbar placeholder-slate-500" placeholder="Nhập câu lệnh để AI hỗ trợ... (Shift + Enter để xuống dòng)"></textarea>
                    
                    <div class="pr-2 pb-1.5 md:pb-2 shrink-0">
                        <button id="btn-send-ai" onclick="sendPromptToAI()" class="w-10 h-10 bg-cyan-600 hover:bg-cyan-500 text-white rounded-xl shadow-[0_0_15px_rgba(34,211,238,0.3)] transition-all flex items-center justify-center cursor-pointer group">
                            <i class="ph-fill ph-paper-plane-right text-lg group-hover:scale-110 transition-transform"></i>
                        </button>
                    </div>
                </div>
                
                <div class="text-center mt-3 flex items-center justify-center">
                    <p class="text-[12px] text-slate-500 font-mono">T-Logi AI có thể bị sai xót. Hãy kiểm tra thông tin quan trọng thật kỹ.</p>
                </div>
            </div>
        </div>
    </main>

    <script src="AI.js"></script>  
</body>
</html>
