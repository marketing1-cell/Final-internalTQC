                            <input type="text" id="new-url-vi" placeholder="Link Embed / Nhúng..." class="w-full p-2.5 border border-slate-200 rounded-lg text-sm focus:border-blue-500 outline-none text-blue-600 bg-blue-50/30">

                            <input type="text" id="new-url-en" placeholder="Embed Link..." class="w-full p-2.5 border border-slate-200 rounded-lg text-sm focus:border-blue-500 outline-none text-blue-600 bg-blue-50/30">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Trung (Giản thể) 🇨🇳</label>
                            <input type="text" id="new-title-zh" placeholder="标题..." class="w-full p-2.5 mb-2 border border-slate-200 rounded-lg text-sm focus:border-blue-500 outline-none">
                            <input type="text" id="new-url-zh" placeholder="嵌入链接..." class="w-full p-2.5 border border-slate-200 rounded-lg text-sm focus:border-blue-500 outline-none text-blue-600 bg-blue-50/30">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Trung (Phồn thể) 🇹🇼</label>
                            <input type="text" id="new-title-zhtw" placeholder="標題..." class="w-full p-2.5 mb-2 border border-slate-200 rounded-lg text-sm focus:border-blue-500 outline-none">
                            <input type="text" id="new-url-zhtw" placeholder="嵌入連結..." class="w-full p-2.5 border border-slate-200 rounded-lg text-sm focus:border-blue-500 outline-none text-blue-600 bg-blue-50/30">
                        </div>
                    </div>
                    <div class="flex gap-2">

                        <button id="btn-save" onclick="savePresentationItem()" class="flex-1 py-3 bg-slate-800 text-white font-bold rounded-xl hover:bg-slate-900 transition-all shadow-md">+ Thêm mục này vào Hệ thống</button>
                    </div>

                    <div id="admin-list-video" class="space-y-2 mb-6"></div>

                    <h4 class="font-black text-sm text-slate-800 uppercase tracking-widest mb-3 flex items-center gap-2"><i class="ph-fill ph-folder-open text-blue-500"></i> Các Thư Mục Slide Đang Hiển Thị</h4>
                    <div id="admin-list-slide" class="space-y-2"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="cfg.js"></script>
    <script src="ath.js"></script>
    
    <script>
        let currentLang = 'vi';
        let presData = []; 
        let editingId = null; 

        const pageTitles = {
            'vi': "Giới thiệu Thông Quan Logistics",
            'en': "About Thong Quan Logistics",
            'zh': "关于通关物流 (Thong Quan)",
            'zh-tw': "關於通關物流 (Thong Quan)"
        };

        document.addEventListener('DOMContentLoaded', async () => {
            await initAuth();
            await fetchPresentations();
        });

        async function initAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).single();
                if (profile) {
                    document.getElementById('current-user-name').innerText = profile.full_name;
                    document.getElementById('current-user-role').innerText = profile.role === 'admin' ? 'Quản trị viên' : 'Nhân viên';
                    if (profile.role === 'admin') document.getElementById('admin-controls').classList.remove('hidden');
                }
            } else { window.location.href = 'login.html'; }
        }

        async function fetchPresentations() {
            const { data, error } = await supabaseClient.from('presentations').select('*').order('created_at', { ascending: true });
            if (data) {
                presData = data;
                changeLang(currentLang);
            }
        }

        function changeLang(lang) {
            currentLang = lang;
            document.getElementById('page-title').innerText = pageTitles[lang];
            
            document.querySelectorAll('.lang-btn').forEach(b => b.className = "lang-btn px-6 py-2 rounded-full text-sm font-bold border transition-all bg-white text-slate-600 border-slate-200 hover:bg-slate-50");
            document.getElementById(`lang-${lang}`).className = "lang-btn px-6 py-2 rounded-full text-sm font-bold border transition-all bg-blue-600 text-white border-blue-600 shadow-lg scale-105";

            const container = document.getElementById('presentation-content');
            if (presData.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-slate-400">Chưa có nội dung. Đợi Admin cập nhật.</div>`;
                return;
            }

            const videos = presData.filter(i => i.item_type === 'video');
            const slides = presData.filter(i => i.item_type === 'slide');

            let htmlRender = "";
            let hasContent = false;

            videos.forEach(item => {
                let content = getValidContent(item, lang);
                if(!content) return;
                hasContent = true;
                htmlRender += `
                <div class="bg-white p-4 md:p-6 rounded-[2rem] shadow-xl border border-slate-100 mb-8 relative z-10">
                    <div class="flex items-center gap-3 mb-6 px-2">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center text-2xl text-red-500 bg-red-50"><i class="ph-fill ph-play-circle"></i></div>
                        <h2 class="text-2xl font-bold text-slate-800">${content.title}</h2>
                    </div>
                    <div class="w-full aspect-video bg-slate-900 rounded-2xl shadow-inner relative z-20">
                        <iframe class="absolute top-0 left-0 w-full h-full rounded-2xl z-30" style="pointer-events: auto;" src="${content.url}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                    </div>
                </div>`;
            });

            slides.forEach(item => {
                let content = getValidContent(item, lang);
                if(!content) return;
                hasContent = true;
                htmlRender += `
                <div class="bg-white rounded-[2rem] shadow-md border border-slate-200 mb-4 transition-all hover:shadow-lg relative z-10">
                    <button onclick="toggleSlide('${item.id}')" class="w-full flex items-center justify-between p-4 md:p-5 bg-white hover:bg-slate-50 transition-colors cursor-pointer group rounded-[2rem]">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center text-xl text-blue-600 bg-blue-50 group-hover:scale-110 transition-transform"><i class="ph-fill ph-folder-open"></i></div>
                            <h2 class="text-lg md:text-xl font-bold text-slate-800 text-left">${content.title}</h2>
                        </div>
                        <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center">
                            <i id="icon-${item.id}" class="ph-bold ph-caret-down text-slate-500 caret-icon"></i>
                        </div>
                    </button>
                    <div id="content-${item.id}" class="slide-content bg-slate-50 border-t border-slate-100 relative z-20">
                        <div class="p-4 md:p-6">
                            <div class="w-full aspect-video bg-slate-200 rounded-xl shadow-inner relative z-30">
                                <iframe class="absolute top-0 left-0 w-full h-full rounded-xl z-40" style="pointer-events: auto;" src="${content.url}" frameborder="0" allowfullscreen></iframe>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
            if(!hasContent) {
                 htmlRender = `<div class="text-center py-20 text-slate-400 border-2 border-dashed border-slate-200 rounded-3xl"><i class="ph-thin ph-monitor-play text-4xl mb-2"></i><br>Chưa có tài liệu cho ngôn ngữ này.</div>`;
            }

            container.innerHTML = htmlRender;
        }


        function getValidContent(item, lang) {
            let c = item.content_data[lang];
            if (c && c.url && c.url.trim() !== "") {
                return c;
            }
            return null;
        }

        window.toggleSlide = function(id) {
            const content = document.getElementById(`content-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            content.classList.toggle('open');
            icon.classList.toggle('open');
        }

        function openAdminManager() {
            document.getElementById('admin-modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('admin-modal').classList.remove('opacity-0'), 10);
            renderAdminList();
            cancelEdit(); 
        }
        
        function closeAdminManager() {
            document.getElementById('admin-modal').classList.add('opacity-0');
            setTimeout(() => document.getElementById('admin-modal').classList.add('hidden'), 300);
        }

        function renderAdminList() {
            const listVideo = document.getElementById('admin-list-video');
            const listSlide = document.getElementById('admin-list-slide');
            
            const renderItem = (item) => {
                let displayTitle = "Chưa có tiêu đề";
                if (item.content_data['vi'] && item.content_data['vi'].title) displayTitle = item.content_data['vi'].title;
                else if (item.content_data['en'] && item.content_data['en'].title) displayTitle = item.content_data['en'].title;

                return `
                <div class="bg-white p-3.5 rounded-xl border border-slate-200 flex justify-between items-center shadow-sm hover:border-blue-300 transition-colors">
                    <p class="font-bold text-sm text-slate-700 truncate pr-4">${displayTitle}</p>
                    <div class="flex gap-1 shrink-0">
                        <button onclick="editItem('${item.id}')" class="text-blue-500 hover:bg-blue-50 p-2 rounded-lg" title="Sửa"><i class="ph-bold ph-pencil-simple"></i></button>
                        <button onclick="deleteItem('${item.id}')" class="text-red-500 hover:bg-red-50 p-2 rounded-lg" title="Xóa"><i class="ph-bold ph-trash"></i></button>
                    </div>
                </div>`;
            };

            listVideo.innerHTML = presData.filter(i => i.item_type === 'video').map(renderItem).join('') || '<p class="text-xs text-slate-400 italic">Chưa có video nào.</p>';
            listSlide.innerHTML = presData.filter(i => i.item_type === 'slide').map(renderItem).join('') || '<p class="text-xs text-slate-400 italic">Chưa có slide nào.</p>';
        }

        window.editItem = function(id) {
            const item = presData.find(i => i.id === id);
            if(!item) return;
            
            editingId = id; 
            
            document.getElementById('form-heading').innerHTML = '<i class="ph-bold ph-pencil-simple text-amber-500"></i> Đang sửa nội dung';
            document.getElementById('new-item-type').value = item.item_type;
            
            ['vi', 'en', 'zh', 'zhtw'].forEach(lang => {
                const dbLang = lang === 'zhtw' ? 'zh-tw' : lang;
                document.getElementById(`new-title-${lang}`).value = item.content_data[dbLang]?.title || '';
                document.getElementById(`new-url-${lang}`).value = item.content_data[dbLang]?.url || '';
            });

            document.getElementById('btn-save').innerHTML = "💾 Cập nhật Thay đổi";
            document.getElementById('btn-save').className = "flex-1 py-3 bg-amber-500 text-white font-bold rounded-xl hover:bg-amber-600 transition-all shadow-md";
            document.getElementById('btn-cancel-edit').classList.remove('hidden');
        }

        window.cancelEdit = function() {
            editingId = null;
            document.getElementById('form-heading').innerHTML = '<i class="ph-bold ph-plus-circle"></i> Thêm Khối Mới';
            document.querySelectorAll('#admin-form-container input').forEach(inp => inp.value = '');
            
            document.getElementById('btn-save').innerHTML = "+ Thêm mục này vào Hệ thống";
            document.getElementById('btn-save').className = "flex-1 py-3 bg-slate-800 text-white font-bold rounded-xl hover:bg-slate-900 transition-all shadow-md";
            document.getElementById('btn-cancel-edit').classList.add('hidden');
        }

        async function savePresentationItem() {
            const type = document.getElementById('new-item-type').value;
            const payload = {
                item_type: type,
                content_data: {
                    'vi': { title: document.getElementById('new-title-vi').value.trim(), url: document.getElementById('new-url-vi').value.trim() },
                    'en': { title: document.getElementById('new-title-en').value.trim(), url: document.getElementById('new-url-en').value.trim() },
                    'zh': { title: document.getElementById('new-title-zh').value.trim(), url: document.getElementById('new-url-zh').value.trim() },
                    'zh-tw': { title: document.getElementById('new-title-zhtw').value.trim(), url: document.getElementById('new-url-zhtw').value.trim() }
                }
            };

            const btn = document.getElementById('btn-save');
            const originalText = btn.innerHTML;
            btn.innerHTML = "Đang xử lý..."; btn.disabled = true;

            let error;
            if (editingId) {
                const res = await supabaseClient.from('presentations').update(payload).eq('id', editingId);
                error = res.error;
            } else {
                const res = await supabaseClient.from('presentations').insert([payload]);
                error = res.error;
            }
            
            if(!error) {
                cancelEdit(); 
                await fetchPresentations(); 
                renderAdminList();
            } else { alert("Lỗi lưu dữ liệu: " + error.message); }
            
            btn.innerHTML = originalText; btn.disabled = false;
        }

        async function deleteItem(id) {
            if(!confirm("Bạn có chắc chắn muốn xóa thư mục này vĩnh viễn?")) return;
            await supabaseClient.from('presentations').delete().eq('id', id);
            if(editingId === id) cancelEdit(); 
            await fetchPresentations();
            renderAdminList();
        }
    
        window.toggleMobileMenu = function() {
            const nav = document.querySelector('header nav');
            if (nav) {
                if (nav.classList.contains('hidden')) {
                    nav.className = 'flex flex-col absolute top-full left-0 w-full bg-white shadow-2xl p-6 gap-4 z-[100] border-b border-slate-200 transition-all';
                } else {
                    nav.className = 'hidden lg:flex items-center gap-2 xl:gap-3 shrink-0 whitespace-nowrap';
                }
            }
        }
    </script>
</body>
</html>
