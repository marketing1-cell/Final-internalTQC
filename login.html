
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | TQC INTERNAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff', 100: '#e0f2fe', 400: '#38bdf8', 500: '#0ea5e9',
                            600: '#0284c7', 800: '#075985', 900: '#0c4a6e',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center h-screen relative overflow-hidden font-sans">
    
    <div class="absolute inset-0 bg-[radial-gradient(#e2e8f0_1px,transparent_0)] [background-size:30px_30px] opacity-50"></div>
    
    <div class="relative w-full max-w-md bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-100 z-10">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-brand-500/30 mx-auto mb-4">
                <img src="logo.png" alt="Logo Công Ty" class="h-30 w-30 object-contain rounded-xl">
            </div>
            
            <h2 class="text-2xl font-bold text-slate-800">THONG QUAN LOGISTICS</h2>
            <p class="text-slate-500 mt-2 text-sm">Hệ thống nội bộ.</p>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Email Đăng nhập</label>
                <input type="email" id="login-email" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 focus:outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10 font-medium" placeholder="VD: nhanvien@tqc.com">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Mật khẩu</label>
                <input type="password" id="login-password" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 focus:outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10 font-medium" placeholder="••••••••">
            </div>
            <div id="login-error" class="text-red-500 text-sm font-medium text-center hidden">Sai email hoặc mật khẩu!</div>
            
            <button type="submit" id="login-btn" class="w-full py-3.5 text-sm font-bold text-white bg-brand-600 hover:bg-brand-700 rounded-2xl shadow-lg shadow-brand-600/30 transition-all">
                Đăng nhập hệ thống
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="LG.js"></script>
</body>
</html>
